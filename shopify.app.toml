client_id = "e61b4105d57657b7d5d8c5a8dc80cc74"
name = "boekhouder"
application_url = "https://shit-shopify-test.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[access_scopes]
scopes = "read_orders,read_shopify_payments_payouts"

[auth]
redirect_urls = [
  "https://shit-shopify-test.onrender.com/auth/callback",
  "https://shit-shopify-test.onrender.com/auth/shopify/callback",
  "https://shit-shopify-test.onrender.com/api/auth/callback"
]

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["orders/create", "orders/updated", "orders/cancelled"]
  uri = "/webhooks/orders"

  [[webhooks.subscriptions]]
  topics = ["refunds/create"]
  uri = "/webhooks/refunds"

[pos]
embedded = false
