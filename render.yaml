services:
  - type: web
    name: shopify-boekhouding
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm run render-build
    preDeployCommand: npx prisma migrate deploy && node prisma/seed.mjs
    startCommand: npm run start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: read_orders,read_all_orders,read_shopify_payments_payouts
      - key: DATABASE_URL
        fromDatabase:
          name: shopify-boekhouding-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: shopify-boekhouding-db
          property: connectionString

databases:
  - name: shopify-boekhouding-db
    plan: basic-256mb
    region: frankfurt
    databaseName: shopify_boekhouding
    user: shopify_boekhouding
    postgresMajorVersion: "17"
