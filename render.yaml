services:
  - type: web
    name: shopify-boekhouding
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm run render-build
    preDeployCommand: npx prisma migrate deploy && node prisma/seed.mjs
    startCommand: npm run start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        value: e61b4105d57657b7d5d8c5a8dc80cc74
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        value: https://shopify-boekhouding.onrender.com
      - key: SCOPES
        value: read_orders,read_shopify_payments_payouts
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
