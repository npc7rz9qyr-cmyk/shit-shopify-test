name: Project uitpakken

on:
  push:
    branches: [main]
    paths:
      - ".bootstrap/**"
      - ".github/workflows/bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Project herstellen
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/part-* > project.zip.b64
          base64 --decode --ignore-garbage project.zip.b64 > project.zip
          echo "ZIP sha256: $(sha256sum project.zip | awk '{print $1}')"
          unzip -t project.zip
          unzip -q -o project.zip
          cp -a shopify-boekhouding/. .
          rm -rf shopify-boekhouding project.zip project.zip.b64 .bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Broncode publiceren
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publiceer complete Shopify Boekhouding MVP [skip ci]" || exit 0
          git push
