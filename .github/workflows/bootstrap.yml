name: Project uitpakken

on:
  push:
    branches: [main]
    paths:
      - "shopify-boekhouding-mvp.zip"
      - ".github/workflows/bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Controleer ZIP
        shell: bash
        run: |
          set -euo pipefail
          test -f shopify-boekhouding-mvp.zip
          echo "ZIP sha256: $(sha256sum shopify-boekhouding-mvp.zip | awk '{print $1}')"
          unzip -t shopify-boekhouding-mvp.zip

      - name: Project uitpakken
        shell: bash
        run: |
          set -euo pipefail
          unzip -q -o shopify-boekhouding-mvp.zip
          cp -a shopify-boekhouding/. .
          rm -rf shopify-boekhouding shopify-boekhouding-mvp.zip .bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Broncode publiceren
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publiceer complete Shopify Boekhouding MVP [skip ci]" || exit 0
          git push
