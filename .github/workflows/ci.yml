name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://localhost:5432/shopify_boekhouding_test
  DIRECT_URL: postgresql://localhost:5432/shopify_boekhouding_test
  SHOPIFY_API_KEY: test
  SHOPIFY_API_SECRET: test
  SHOPIFY_APP_URL: https://example.com
  SCOPES: read_orders,read_shopify_payments_payouts

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          package-manager-cache: false
      - run: npm install
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
